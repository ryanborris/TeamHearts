<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family Hearts">
<meta name="theme-color" content="#1a2e26">
<title>Family Hearts</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1f1a;--surface:#1a2e26;--surface2:#213829;--surface3:#162219;
  --border:#2e4a3a;--border2:#4a6e58;
  --text:#e8f0ec;--muted:#7aaa90;--dim:#4a7060;
  --accent:#c0392b;--accent2:#e85d4a;--accentbg:#2a1510;
  --green:#2ecc71;--blue:#3a8fd4;--bluebg:#0f1e2e;
  --radius:10px;--radius-lg:14px;--radius-xl:20px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

header{background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;padding-top:env(safe-area-inset-top,0)}
.header-inner{display:flex;align-items:center;gap:10px;padding:14px 18px 0}
.logo{font-size:20px;color:var(--accent2)}
.app-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);margin-left:auto;transition:background .3s;flex-shrink:0}
.sync-dot.ok{background:var(--green);box-shadow:0 0 6px #2ecc7166}
.sync-dot.err{background:var(--accent2)}
.sync-dot.spin{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
nav{display:flex;margin-top:2px}
nav button{flex:1;padding:11px 4px;font-size:12px;font-weight:500;letter-spacing:.3px;
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--muted);cursor:pointer;transition:color .15s,border-color .15s;font-family:inherit}
nav button.active{color:var(--text);border-bottom-color:var(--accent2)}
main{flex:1;padding:20px 18px 60px;overflow-y:auto}

/* BUTTONS */
.btn{padding:11px 18px;font-size:14px;font-weight:600;border-radius:var(--radius);
  cursor:pointer;transition:opacity .15s,transform .1s;border:none;font-family:inherit;width:100%}
.btn:active:not(:disabled){transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;margin-top:12px}
.btn-primary:disabled{opacity:.4;cursor:default}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);width:auto;padding:10px 16px}
.btn-icon{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;
  padding:4px 8px;line-height:1;border-radius:6px;transition:color .15s,background .15s;font-family:inherit}
.btn-icon:hover{color:var(--accent2);background:var(--surface2)}
.btn-del{background:none;border:none;color:var(--dim);font-size:15px;cursor:pointer;
  padding:4px 6px;line-height:1;border-radius:6px;transition:color .15s,background .15s;font-family:inherit;flex-shrink:0}
.btn-del:hover{color:var(--accent2);background:var(--accentbg)}

/* SEGMENT */
.seg{display:flex;background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius);
  padding:3px;gap:3px;margin-bottom:18px}
.seg button{flex:1;padding:8px;font-size:13px;font-weight:500;border:none;border-radius:7px;
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit}
.seg button.active{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:600;color:#fff;flex-shrink:0;letter-spacing:-.3px}
.av-lg{width:36px;height:36px;font-size:12px}
.av-md{width:28px;height:28px;font-size:10px}
.av-sm{width:22px;height:22px;font-size:9px}

/* PLAYER GRID */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:18px}
.player-tile{border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 12px;cursor:pointer;
  display:flex;align-items:center;gap:10px;background:var(--surface3);transition:all .12s;
  -webkit-tap-highlight-color:transparent;user-select:none}
.player-tile.sel{border-color:var(--accent2);background:var(--surface2)}
.player-tile.team-a{border-color:var(--blue);background:var(--bluebg)}
.player-tile.team-b{border-color:var(--green);background:#0a2010}
.player-tile span{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* TEAM BUILDER */
.team-builder{margin-bottom:18px}
.team-label{font-size:11px;letter-spacing:.5px;text-transform:uppercase;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.team-a-label{color:var(--blue)}
.team-b-label{color:var(--green)}
.team-slot{border:1px dashed var(--border);border-radius:var(--radius-lg);padding:10px 12px;
  min-height:52px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.team-slot.has-players{border-style:solid}
.team-slot.team-a-slot{border-color:var(--blue)}
.team-slot.team-b-slot{border-color:var(--green)}
.team-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);
  border:1px solid var(--border);border-radius:99px;padding:4px 10px 4px 5px;font-size:12px;font-weight:500}
.team-chip .rm{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;line-height:1;padding:0 0 0 2px;font-family:inherit}
.team-chip .rm:hover{color:var(--accent2)}
.team-instructions{font-size:12px;color:var(--dim);margin-bottom:10px}

/* SCORE GRID */
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.score-row{display:flex;align-items:center;gap:8px;border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 12px;background:var(--surface3)}
.score-row span{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-row input{width:60px;text-align:right;font-size:15px;font-weight:600;
  background:transparent;border:none;color:var(--text);outline:none;font-family:inherit}
.score-row input::placeholder{color:var(--dim)}

/* RECORDS / LEADERBOARD */
.rec-tabs{display:flex;gap:8px;margin-bottom:16px}
.rec-tab{padding:7px 14px;font-size:12px;font-weight:500;border-radius:99px;
  border:1px solid var(--border);background:var(--surface3);color:var(--muted);
  cursor:pointer;transition:all .15s;font-family:inherit}
.rec-tab.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}

.lb-wrap{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px}
.lb-head{display:grid;padding:8px 14px;font-size:11px;color:var(--muted);letter-spacing:.4px;
  text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2)}
.lb-head.ind{grid-template-columns:1fr 48px 48px 48px 64px}
.lb-head.team{grid-template-columns:1fr 48px 48px 64px}
.lb-row{display:grid;padding:11px 14px;align-items:center;border-bottom:1px solid var(--border);background:var(--surface)}
.lb-row.ind{grid-template-columns:1fr 48px 48px 48px 64px}
.lb-row.team{grid-template-columns:1fr 48px 48px 64px}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--surface2)}
.tc{text-align:center}.tr{text-align:right}
.wins{color:#2ecc71;font-weight:600}

/* STATS STRIP */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.stat{background:var(--surface2);border-radius:var(--radius);padding:12px 10px}
.stat .sl{font-size:10px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.stat .sv{font-size:16px;font-weight:600}

/* GAME HISTORY CARDS */
.game-card{border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:13px 15px;margin-bottom:10px;background:var(--surface)}
.gm{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.gd{font-size:12px;color:var(--muted);flex:1}
.gb{font-size:10px;padding:3px 9px;border-radius:99px;background:var(--surface2);
  color:var(--muted);border:1px solid var(--border);text-transform:capitalize;letter-spacing:.4px}
.gp{display:flex;align-items:center;gap:10px;padding:4px 0}
.gr{font-size:11px;width:16px;text-align:center;color:var(--dim);flex-shrink:0}
.gr.first{color:var(--accent2)}

/* ROSTER */
.roster-item{display:flex;align-items:center;gap:10px;border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:10px 14px;background:var(--surface);margin-bottom:8px}
.add-row{display:flex;gap:8px;margin-bottom:18px}
.add-row input{flex:1;background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-size:14px;padding:10px 13px;outline:none;transition:border-color .15s;font-family:inherit}
.add-row input:focus{border-color:var(--border2)}
.add-row input::placeholder{color:var(--dim)}

/* SECTION HEADER */
.section-head{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.5px;
  text-transform:uppercase;margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface2);border:1px solid var(--border2);border-radius:99px;
  padding:9px 20px;font-size:13px;font-weight:500;color:var(--text);
  z-index:999;transition:transform .3s cubic-bezier(.175,.885,.32,1.275),opacity .3s;
  white-space:nowrap;pointer-events:none;opacity:0;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.empty{text-align:center;padding:3rem 0;color:var(--muted);font-size:13px}
.empty .big{font-size:28px;margin-bottom:10px;opacity:.5}
.loader{text-align:center;padding:40px 0;color:var(--muted);font-size:13px}
.dot{display:inline-block;animation:blink .8s infinite alternate}
.dot:nth-child(2){animation-delay:.25s}
.dot:nth-child(3){animation-delay:.5s}
@keyframes blink{from{opacity:.2}to{opacity:1}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const API_KEY = '$2a$10$gSbxo0etJXmqOy/.WDj6O.7qP4zTM/3QM2kKpn7.bgGM1usdFe.ii';
const BIN_ID  = '6a06089a250b1311c34e4710';
const API     = 'https://api.jsonbin.io/v3/b';

const AV_COLS=['#2c7a5a','#1a5fa8','#7a2c5a','#7a5a2c','#2c5a7a','#5a2c7a','#5a7a2c','#a83c1a','#1a7a7a','#7a1a2c'];
let state=null, tab='play', syncTmr=null;

// play state
let ps = { mode:'individual', sel:[], sc:{}, teamA:[], teamB:[], teamSc:{A:0,B:0} };
// records sub-tab
let recTab = 'individual';

function avc(n){let h=0;for(let i=0;i<n.length;i++)h=(h+n.charCodeAt(i)*31)%AV_COLS.length;return AV_COLS[h]}
function ini(n){return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?'}
function av(n,c='av-lg'){return`<div class="av ${c}" style="background:${avc(n)}">${ini(n)}</div>`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function teamName(members){return members.map(n=>ini(n)).join('+')}

let toastT=null;
function toast(msg,dur=2600){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),dur);
}
function sd(s){
  const d=document.getElementById('sd');if(!d)return;
  d.className='sync-dot'+(s==='ok'?' ok':s==='err'?' err':s==='spin'?' spin':'');
}

// ── API ──────────────────────────────────────────────────────────────────────
async function readBin(){
  const r=await fetch(`${API}/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
  if(!r.ok) throw new Error('Read failed');
  return (await r.json()).record;
}
async function writeBin(data){
  const r=await fetch(`${API}/${BIN_ID}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
    body:JSON.stringify(data)
  });
  if(!r.ok) throw new Error('Write failed');
}
async function load(){
  sd('spin');
  try{
    state=await readBin();
    state.players=state.players||[];
    state.games=state.games||[];
    sd('ok');return true;
  }catch(e){sd('err');return false}
}
async function save(){
  sd('spin');
  try{await writeBin(state);sd('ok');return true}
  catch(e){sd('err');toast('Sync failed');return false}
}
function startRefresh(){
  clearInterval(syncTmr);
  syncTmr=setInterval(async()=>{
    if(!document.hidden){
      try{const s=await readBin();if(s){state=s;state.players=state.players||[];state.games=state.games||[];renderTab(tab)}}catch(e){}
    }
  },15000);
}

// ── SHELL ────────────────────────────────────────────────────────────────────
function renderShell(){
  document.getElementById('app').innerHTML=`
  <header>
    <div class="header-inner">
      <span class="logo">♥</span>
      <span class="app-title">Family Hearts</span>
      <div class="sync-dot" id="sd"></div>
    </div>
    <nav>
      <button id="t-play"    class="active" onclick="switchTab('play')">Play</button>
      <button id="t-records"            onclick="switchTab('records')">Records</button>
      <button id="t-roster"             onclick="switchTab('roster')">Roster</button>
    </nav>
  </header>
  <main id="main"></main>`;
}
function switchTab(t){
  tab=t;
  ['play','records','roster'].forEach(x=>document.getElementById('t-'+x).classList.toggle('active',x===t));
  renderTab(t);
}
function renderTab(t){
  if(t==='play')    renderPlay();
  else if(t==='records') renderRecords();
  else renderRoster();
}

// ── PLAY ─────────────────────────────────────────────────────────────────────
function renderPlay(){
  const el=document.getElementById('main');
  const players=state.players||[];
  const {mode,sel,sc,teamA,teamB,teamSc}=ps;

  // INDIVIDUAL mode
  if(mode==='individual'){
    let pg='';
    if(!players.length){
      pg=`<div class="empty"><div class="big">👤</div>Add players in the Roster tab first.</div>`;
    }else{
      pg=`<p style="font-size:12px;color:var(--muted);margin-bottom:8px">Select 2–4 players</p><div class="player-grid">`;
      players.forEach(p=>{
        pg+=`<div class="player-tile ${sel.includes(p.name)?'sel':''}" onclick="tglP('${esc(p.name)}')">${av(p.name,'av-md')}<span>${esc(p.name)}</span></div>`;
      });
      pg+='</div>';
    }
    let sg='';
    if(sel.length>=2){
      sg=`<p style="font-size:12px;color:var(--muted);margin-bottom:8px">Final scores <span style="color:var(--dim)">(lower is better)</span></p><div class="score-grid">`;
      sel.forEach(n=>{
        sg+=`<div class="score-row"><span>${esc(n)}</span><input type="number" min="0" max="260" placeholder="0" value="${sc[n]!==undefined?sc[n]:''}" oninput="updSc('${esc(n)}',this.value)"></div>`;
      });
      sg+='</div>';
    }
    el.innerHTML=`
    <div class="seg">
      <button class="active" onclick="setMode('individual')">Individual</button>
      <button onclick="setMode('team')">Team</button>
    </div>
    ${pg}${sg}
    ${sel.length>=2?`<button class="btn btn-primary" onclick="saveIndGame()">Save Game ♥</button>`:''}`;
    return;
  }

  // TEAM mode
  if(!players.length){
    el.innerHTML=`<div class="seg"><button onclick="setMode('individual')">Individual</button><button class="active">Team</button></div><div class="empty"><div class="big">👤</div>Add players in the Roster tab first.</div>`;
    return;
  }

  // available = not yet on either team
  const assigned=[...teamA,...teamB];
  const avail=players.filter(p=>!assigned.includes(p.name));

  let poolHTML='';
  if(avail.length){
    poolHTML=`<p class="team-instructions">Tap a player, then tap a team slot to assign them</p>
    <div class="player-grid" style="margin-bottom:14px">`;
    avail.forEach(p=>{
      poolHTML+=`<div class="player-tile" onclick="tglP('${esc(p.name)}')" style="${sel.includes(p.name)?'border-color:var(--accent2);background:var(--surface2)':''}">${av(p.name,'av-md')}<span>${esc(p.name)}</span></div>`;
    });
    poolHTML+='</div>';
  }

  function chips(team,letter){
    return team.map(n=>`<div class="team-chip">${av(n,'av-sm')}<span>${esc(n)}</span><button class="rm" onclick="rmFromTeam('${esc(n)}','${letter}')">×</button></div>`).join('');
  }

  const canScore = teamA.length>=1 && teamB.length>=1;
  let scHTML='';
  if(canScore){
    scHTML=`<p style="font-size:12px;color:var(--muted);margin-bottom:8px">Team scores <span style="color:var(--dim)">(lower is better)</span></p>
    <div class="score-grid">
      <div class="score-row"><span style="color:#3a8fd4">Team A</span><input type="number" min="0" max="260" placeholder="0" value="${teamSc.A||''}" oninput="updTeamSc('A',this.value)"></div>
      <div class="score-row"><span style="color:var(--green)">Team B</span><input type="number" min="0" max="260" placeholder="0" value="${teamSc.B||''}" oninput="updTeamSc('B',this.value)"></div>
    </div>`;
  }

  el.innerHTML=`
  <div class="seg">
    <button onclick="setMode('individual')">Individual</button>
    <button class="active">Team</button>
  </div>
  ${poolHTML}
  <div class="team-builder">
    <div class="team-label team-a-label">● Team A ${sel.length?`<span style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">— tap to add selected</span>`:''}</div>
    <div class="team-slot ${teamA.length?'has-players team-a-slot':''}" onclick="addToTeam('A')">${teamA.length?chips(teamA,'A'):`<span style="font-size:12px;color:var(--dim)">Tap to add ${sel.length?'selected player':'a player'}</span>`}</div>
    <div class="team-label team-b-label">● Team B ${sel.length?`<span style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">— tap to add selected</span>`:''}</div>
    <div class="team-slot ${teamB.length?'has-players team-b-slot':''}" onclick="addToTeam('B')">${teamB.length?chips(teamB,'B'):`<span style="font-size:12px;color:var(--dim)">Tap to add ${sel.length?'selected player':'a player'}</span>`}</div>
  </div>
  ${scHTML}
  ${canScore?`<button class="btn btn-primary" onclick="saveTeamGame()">Save Team Game ♥</button>`:''}`;
}

function setMode(m){ps={mode:m,sel:[],sc:{},teamA:[],teamB:[],teamSc:{A:0,B:0}};renderPlay()}
function tglP(n){
  if(ps.mode==='individual'){
    const i=ps.sel.indexOf(n);if(i>=0)ps.sel.splice(i,1);else if(ps.sel.length<4)ps.sel.push(n);
  }else{
    const i=ps.sel.indexOf(n);if(i>=0)ps.sel.splice(i,1);else ps.sel=[n]; // single select in team mode
  }
  renderPlay();
}
function addToTeam(letter){
  if(!ps.sel.length) return;
  const name=ps.sel[0];
  const already=[...ps.teamA,...ps.teamB];
  if(already.includes(name)){toast('Already assigned');return}
  if(letter==='A') ps.teamA.push(name);
  else ps.teamB.push(name);
  ps.sel=[];
  renderPlay();
}
function rmFromTeam(name,letter){
  if(letter==='A') ps.teamA=ps.teamA.filter(x=>x!==name);
  else ps.teamB=ps.teamB.filter(x=>x!==name);
  renderPlay();
}
function updSc(n,v){ps.sc[n]=parseInt(v)||0}
function updTeamSc(t,v){ps.teamSc[t]=parseInt(v)||0}

async function saveIndGame(){
  const {sel,sc}=ps;if(sel.length<2)return;
  const sorted=[...sel].sort((a,b)=>(sc[a]||0)-(sc[b]||0));
  const g={id:Date.now(),date:new Date().toISOString(),mode:'individual',
    players:sel,scores:{...sc},winner:sorted[0]};
  await load();state.games=[g,...(state.games||[])];
  if(await save()){ps={mode:'individual',sel:[],sc:{},teamA:[],teamB:[],teamSc:{A:0,B:0}};toast('Game saved ♥');renderPlay()}
}

async function saveTeamGame(){
  const {teamA,teamB,teamSc}=ps;
  if(!teamA.length||!teamB.length){toast('Both teams need at least one player');return}
  const winner = teamSc.A<=teamSc.B ? 'A' : 'B';
  const g={id:Date.now(),date:new Date().toISOString(),mode:'team',
    teamA:[...teamA],teamB:[...teamB],
    scores:{A:teamSc.A,B:teamSc.B},
    winner, // 'A' or 'B'
    players:[...teamA,...teamB]};
  await load();state.games=[g,...(state.games||[])];
  if(await save()){ps={mode:'individual',sel:[],sc:{},teamA:[],teamB:[],teamSc:{A:0,B:0}};toast('Team game saved ♥');renderPlay()}
}

// ── RECORDS ──────────────────────────────────────────────────────────────────
function renderRecords(){
  const el=document.getElementById('main');
  const players=state.players||[], games=state.games||[];

  // individual stats
  const istats={};
  players.forEach(p=>{istats[p.name]={w:0,l:0,tot:0,gp:0}});
  games.filter(g=>g.mode==='individual').forEach(g=>{
    (g.players||[]).forEach(n=>{
      if(!istats[n])istats[n]={w:0,l:0,tot:0,gp:0};
      istats[n].gp++;istats[n].tot+=(g.scores&&g.scores[n])||0;
      if(g.winner===n)istats[n].w++;else istats[n].l++;
    });
  });
  const irows=Object.entries(istats).sort((a,b)=>b[1].w-a[1].w||a[1].l-b[1].l);

  // team stats — key = sorted member names joined
  const tstats={};
  games.filter(g=>g.mode==='team').forEach(g=>{
    ['A','B'].forEach(letter=>{
      const members=(letter==='A'?g.teamA:g.teamB)||[];
      if(!members.length) return;
      const key=members.slice().sort().join(',');
      const label=members.map(n=>n.split(' ')[0]).join(' & ');
      if(!tstats[key])tstats[key]={label,members,w:0,l:0,tot:0,gp:0};
      tstats[key].gp++;
      tstats[key].tot+=(g.scores&&g.scores[letter])||0;
      if(g.winner===letter)tstats[key].w++;else tstats[key].l++;
    });
  });
  const trows=Object.entries(tstats).sort((a,b)=>b[1].w-a[1].w);

  const totalGames=games.length;
  const indGames=games.filter(g=>g.mode==='individual').length;
  const teamGames=games.filter(g=>g.mode==='team').length;
  const topInd=irows[0]?irows[0][0]:'—';

  // Game history cards
  let histHTML='';
  if(!games.length){
    histHTML=`<div class="empty"><div class="big">🃏</div>No games yet — play one!</div>`;
  }else{
    games.forEach(g=>{
      const ds=new Date(g.date).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
      let playersHTML='';
      if(g.mode==='team'){
        const aScore=(g.scores&&g.scores.A)||0, bScore=(g.scores&&g.scores.B)||0;
        const aWin=g.winner==='A';
        playersHTML+=`<div class="gp">
          <span class="gr ${aWin?'first':''}">${aWin?'♥':'2'}</span>
          <span style="flex:1;font-size:13px;font-weight:${aWin?600:400};color:${aWin?'var(--text)':'var(--muted)'}">
            Team A: ${esc((g.teamA||[]).map(n=>n.split(' ')[0]).join(' & '))}
          </span>
          <span style="font-size:13px;font-weight:${aWin?600:400};color:var(--text)">${aScore}</span>
        </div>
        <div class="gp">
          <span class="gr ${!aWin?'first':''}">${!aWin?'♥':'2'}</span>
          <span style="flex:1;font-size:13px;font-weight:${!aWin?600:400};color:${!aWin?'var(--text)':'var(--muted)'}">
            Team B: ${esc((g.teamB||[]).map(n=>n.split(' ')[0]).join(' & '))}
          </span>
          <span style="font-size:13px;font-weight:${!aWin?600:400};color:var(--text)">${bScore}</span>
        </div>`;
      }else{
        const sorted=[...(g.players||[])].sort((a,b)=>(g.scores&&g.scores[a]||0)-(g.scores&&g.scores[b]||0));
        playersHTML=sorted.map((n,i)=>`<div class="gp">
          <span class="gr ${i===0?'first':''}">${i===0?'♥':i+1}</span>
          ${av(n,'av-sm')}
          <span style="flex:1;font-size:13px;font-weight:${i===0?600:400};color:${i===0?'var(--text)':'var(--muted)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(n)}</span>
          <span style="font-size:13px;font-weight:${i===0?600:400};color:var(--text)">${(g.scores&&g.scores[n])||0}</span>
        </div>`).join('');
      }
      histHTML+=`<div class="game-card">
        <div class="gm">
          <span class="gd">${ds}</span>
          <span class="gb">${g.mode==='team'?'team':'individual'}</span>
          <button class="btn-del" onclick="deleteGame(${g.id})" title="Delete game">🗑</button>
        </div>
        ${playersHTML}
      </div>`;
    });
  }

  el.innerHTML=`
  <div class="stats">
    <div class="stat"><div class="sl">Total</div><div class="sv">${totalGames}</div></div>
    <div class="stat"><div class="sl">Individual</div><div class="sv">${indGames}</div></div>
    <div class="stat"><div class="sl">Team</div><div class="sv">${teamGames}</div></div>
  </div>

  <div class="rec-tabs">
    <button class="rec-tab ${recTab==='individual'?'active':''}" onclick="setRecTab('individual')">Individual</button>
    <button class="rec-tab ${recTab==='team'?'active':''}" onclick="setRecTab('team')">Teams</button>
    <button class="rec-tab ${recTab==='history'?'active':''}" onclick="setRecTab('history')">Game Log</button>
  </div>

  ${recTab==='individual'?`
    ${!irows.length?`<div class="empty"><div class="big">📊</div>No individual games yet.</div>`:`
    <div class="lb-wrap">
      <div class="lb-head ind"><span>Player</span><span class="tc">W</span><span class="tc">L</span><span class="tc">GP</span><span class="tr">Avg</span></div>
      ${irows.map(([n,s],i)=>`<div class="lb-row ind">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:${i===0?'var(--accent2)':'var(--dim)'};font-size:11px;width:14px">${i===0?'♥':i+1}</span>
          ${av(n,'av-md')}<span style="font-size:13px;font-weight:500">${esc(n)}</span>
        </div>
        <span class="tc wins">${s.w}</span>
        <span class="tc" style="color:var(--muted)">${s.l}</span>
        <span class="tc" style="color:var(--muted)">${s.gp}</span>
        <span class="tr" style="color:var(--muted)">${s.gp?Math.round(s.tot/s.gp):'—'}</span>
      </div>`).join('')}
    </div>`}`:''}

  ${recTab==='team'?`
    ${!trows.length?`<div class="empty"><div class="big">👥</div>No team games yet.</div>`:`
    <div class="lb-wrap">
      <div class="lb-head team"><span>Team</span><span class="tc">W</span><span class="tc">L</span><span class="tr">Avg</span></div>
      ${trows.map(([k,s],i)=>`<div class="lb-row team">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:${i===0?'var(--accent2)':'var(--dim)'};font-size:11px;width:14px">${i===0?'♥':i+1}</span>
          <div>
            <div style="font-size:13px;font-weight:500">${esc(s.label)}</div>
            <div style="font-size:10px;color:var(--dim)">${s.gp} game${s.gp!==1?'s':''}</div>
          </div>
        </div>
        <span class="tc wins">${s.w}</span>
        <span class="tc" style="color:var(--muted)">${s.l}</span>
        <span class="tr" style="color:var(--muted)">${s.gp?Math.round(s.tot/s.gp):'—'}</span>
      </div>`).join('')}
    </div>`}`:''}

  ${recTab==='history'?histHTML:''}`;
}

function setRecTab(t){recTab=t;renderRecords()}

async function deleteGame(id){
  if(!confirm('Delete this game? This cannot be undone.')) return;
  await load();
  state.games=(state.games||[]).filter(g=>g.id!==id);
  if(await save()){toast('Game deleted');renderRecords()}
}

// ── ROSTER ───────────────────────────────────────────────────────────────────
function renderRoster(){
  const el=document.getElementById('main');
  const players=state.players||[];
  el.innerHTML=`
  <div class="add-row">
    <input type="text" id="nn" placeholder="Player name…" maxlength="30" onkeydown="if(event.key==='Enter')addP()">
    <button class="btn btn-ghost" onclick="addP()">Add</button>
  </div>
  ${!players.length?`<div class="empty"><div class="big">👤</div>No players yet. Add one above!</div>`
    :players.map(p=>`<div class="roster-item">${av(p.name,'av-lg')}<span style="flex:1;font-size:14px;font-weight:500">${esc(p.name)}</span><button class="btn-icon" onclick="rmP('${esc(p.name)}')" aria-label="Remove">×</button></div>`).join('')}
  <p style="font-size:11px;color:var(--dim);text-align:center;margin-top:16px">Changes sync to all devices automatically.</p>`;
  setTimeout(()=>{const i=document.getElementById('nn');if(i)i.focus()},50);
}
async function addP(){
  const inp=document.getElementById('nn');if(!inp)return;
  const name=inp.value.trim();if(!name)return;
  if((state.players||[]).find(p=>p.name.toLowerCase()===name.toLowerCase())){toast('Already on the roster');return}
  await load();state.players=[...(state.players||[]),{name}];
  if(await save()){toast(name+' added');renderRoster()}
}
async function rmP(name){
  if(!confirm('Remove '+name+' from the roster?'))return;
  await load();state.players=(state.players||[]).filter(p=>p.name!==name);
  if(await save()){toast(name+' removed');renderRoster()}
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
(async function boot(){
  renderShell();
  document.getElementById('main').innerHTML=`<div class="loader"><span class="dot">●</span><span class="dot">●</span><span class="dot">●</span></div>`;
  const ok=await load();
  if(!ok){
    document.getElementById('main').innerHTML=`<div class="empty"><div class="big">⚠️</div>Could not connect.<br><br>Check your internet and refresh.</div>`;
    return;
  }
  startRefresh();renderTab('play');
})();
</script>
</body>
